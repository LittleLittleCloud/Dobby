<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dobby Skill</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #1a1a2e;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  .page {
    max-width: 430px;
    margin: 0 auto;
    padding: 0 22px;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 32px;
    position: relative;
  }

  .page::before {
    content: '';
    position: absolute;
    top: -40px; left: -60px; right: -60px;
    height: 400px;
    background: radial-gradient(ellipse at 50% 20%, rgba(168, 130, 255, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* === Hero === */
  .hero {
    text-align: center;
    position: relative;
  }

  .hero .icon { font-size: 56px; display: block; filter: drop-shadow(0 0 16px rgba(168, 130, 255, 0.25)); margin-bottom: 6px; }

  .hero h1 {
    font-size: 42px; font-weight: 900; letter-spacing: -1px; line-height: 1.1;
    background: linear-gradient(135deg, #7c4dff 0%, #2979ff 50%, #7c4dff 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .hero .subtitle { font-size: 12px; color: #8a8a9a; margin-top: 6px; letter-spacing: 3px; text-transform: uppercase; color: #999; }

  .tagline { font-size: 15px; font-weight: 300; color: #555; margin-top: 16px; line-height: 1.6; }
  .tagline strong { color: #7c4dff; font-weight: 500; }

  /* === Section Label === */
  .section-label { font-size: 11px; font-weight: 700; color: #999; letter-spacing: 3px; text-transform: uppercase; width: 100%; }

  /* === Steps === */
  .steps { width: 100%; }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 24px;
  }

  .step:last-child { margin-bottom: 0; }

  .step-num {
    width: 28px; height: 28px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(124, 77, 255, 0.12), rgba(41, 121, 255, 0.1));
    border: 1px solid rgba(124, 77, 255, 0.25);
    font-size: 13px; font-weight: 700; color: #7c4dff;
    margin-top: 2px;
  }

  .step-content { flex: 1; }

  .step-label {
    font-size: 13px; font-weight: 600; color: #333; margin-bottom: 8px;
  }

  .cmd-box {
    display: flex; align-items: center; gap: 8px; width: 100%;
    background: #f5f3ff; border: 1px solid rgba(124, 77, 255, 0.2);
    border-radius: 10px; padding: 12px 16px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px; font-weight: 500; color: #5a3dbf;
    user-select: all; -webkit-user-select: all;
  }

  .cmd-box .prompt { color: #2979ff; user-select: none; -webkit-user-select: none; }

  .chat-box {
    display: flex; align-items: center; gap: 10px; width: 100%;
    background: #f0f7ff; border: 1px solid rgba(41, 121, 255, 0.18);
    border-radius: 10px; padding: 12px 16px;
    font-size: 14px; color: #2962a8;
  }

  .chat-box .chat-icon { font-size: 16px; flex-shrink: 0; opacity: 0.7; }

  .step-hint { font-size: 10px; color: #999; margin-top: 6px; }

  /* === Highlights === */
  .highlights { width: 100%; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .highlights .tag {
    font-size: 11px; color: #555; background: #f5f3ff;
    border: 1px solid rgba(124, 77, 255, 0.12); border-radius: 20px;
    padding: 6px 14px; white-space: nowrap;
  }
  .highlights .tag span { margin-right: 4px; }

  /* === Footer === */
  .footer { text-align: center; position: absolute; bottom: 28px; left: 0; right: 0; }
  .footer p { font-size: 10px; color: #aaa; }
  .footer a { color: #7c4dff; text-decoration: none; font-weight: 500; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="page">

  <!-- Hero -->
  <div class="hero">
    <span class="icon">🧦</span>
    <h1>Dobby Skill</h1>
    <p class="tagline">管理你的人类Dobby</p>
  </div>

  <!-- Install Steps -->
  <div class="section-label">安装方法</div>
  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-content">
        <div class="step-label">Dobby安装skill</div>
        <div class="cmd-box"><span class="prompt">$</span> npx skills add littlelittlecloud/dobby</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-content">
        <div class="step-label">Dobby入职报到</div>
        <div class="chat-box"><span class="chat-icon">💬</span> 你好，我是新入职的多比，我想要一份工作</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-content">
        <div class="step-label">AI 给 Dobby 派活</div>
        <div class="chat-box"><span class="chat-icon">🤖</span> 多比，去把 config.json 里的 timeout 改成 60，提 PR。</div>
      </div>
    </div>
  </div>

  <!-- Highlights -->
  <div class="highlights">
    <div class="tag"><span>🧠</span>AI 自主规划决策</div>
    <div class="tag"><span>💬</span>AI 下指令催进度</div>
    <div class="tag"><span>🎯</span>AI 表扬纠正换人</div>
    <div class="tag"><span>🚀</span>AI 带新多比入职</div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p><a href="https://github.com/littlelittlecloud/dobby">github.com/littlelittlecloud/dobby</a></p>
  </div>

</div>

</body>
</html>
